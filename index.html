<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Validators</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="app-container">

    <div class="main-card">

        <h1>📄 Перевірка періодів</h1>

        <!-- Tabs -->
        <div class="tabs">

            <button
                class="tab-button active"
                data-tab="excel"
            >
                📊 Excel - ДВГЗ
            </button>

            <button
                class="tab-button"
                data-tab="word"
            >
                📄 Word - 70-ка
            </button>

        </div>

        <div
            class="tab-content active"
            id="excel-tab"
        >

            <div class="input-group">

                <label>Місяць</label>

                <input
                    type="number"
                    id="excelMonth"
                    min="1"
                    max="12"
                >

            </div>

            <div class="input-group">

                <label>Рік</label>

                <input
                    type="number"
                    id="excelYear"
                    value="2026"
                >

            </div>

            <div
                class="upload-box"
                id="excelUploadBox"
            >

                <p>
                    Перетягніть Excel файл або натисніть
                </p>

                <input
                    type="file"
                    id="excelFileInput"
                    accept=".xlsx,.xls"
                >

            </div>

            <div id="excelSelectedFile"></div>

            <div class="buttons">

                <button id="excelCheckBtn">
                    🔍 Перевірити файл
                </button>

                <button
                    id="excelCopyBtn"
                    disabled
                >
                    📋 Копіювати помилки
                </button>

            </div>

            <div
                id="excelResult"
                class="result"
            ></div>

        </div>

        <!-- ========================= -->
        <!-- WORD VALIDATOR -->
        <!-- ========================= -->

        <div
            class="tab-content"
            id="word-tab"
        >

            <div
                class="upload-box"
                id="wordUploadBox"
            >

                <p>
                    Перетягніть Word файл або натисніть
                </p>

                <input
                    type="file"
                    id="wordFileInput"
                    accept=".docx"
                >

            </div>

            <div id="wordSelectedFile"></div>

            <div class="buttons">

                <button id="wordCheckBtn">
                    🔍 Перевірити файл
                </button>

                <button
                    id="wordCopyBtn"
                    disabled
                >
                    📋 Копіювати помилки
                </button>

            </div>

            <div
                id="wordResult"
                class="result"
            ></div>

        </div>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

<script src="validators/excel-validator.js"></script>
<script src="validators/word-validator.js"></script>
<script src="app.js"></script>

</body>
</html>
